services:
  postgres:
    image: postgres:16-alpine
    container_name: oss-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-oss_db}
      POSTGRES_USER: ${POSTGRES_USER:-oss_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-oss_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-oss_user} -d ${POSTGRES_DB:-oss_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
